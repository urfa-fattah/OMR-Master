<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR Master Pro - Correction & Results</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        bangla: ['Hind Siliguri', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                        'pop-in': 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        popIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-attachment: fixed;
            background: radial-gradient(circle at top left, #f8fafc, #e2e8f0); 
        }
        .dark body {
            background: radial-gradient(circle at top left, #0f172a, #1e293b);
        }
        
        /* Enhanced Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .nav-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
        .dark .nav-glass {
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(30, 41, 59, 0.8);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Progress Circle */
        .progress-ring { transform: rotate(-90deg); transform-origin: 50% 50%; }
        .progress-ring__circle { transition: stroke-dashoffset 0.5s ease-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-100 transition-colors duration-300 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext, useMemo, useCallback, memo } = React;

        // --- Translations ---
        const translations = {
            en: {
                app_name: "OMR Master", pro: "PRO", dashboard: "Dashboard", active_session: "Active Session",
                analytics: "Analytics", about: "About", report: "Report Issues", guideline: "Guidelines", contact: "Contact",
                footer_credit: "Designed & Developed by", footer_rights: "All Rights Reserved.",
                correction_title: "Smart Correction & Results",
                exam_name: "Exam Name",
                total_questions: "Total Questions",
                attempted: "Attempted",
                correct: "Correct",
                wrong: "Wrong",
                skipped: "Skipped",
                score: "Score",
                accuracy: "Accuracy",
                time_taken: "Time Taken",
                finalize_results: "Finalize Results",
                loading_results: "Loading results...",
                keyboard_shortcuts: "Keyboard Shortcuts",
                use_shortcuts: "Type A, B, C, D to set answer key & auto-grade. Use arrows to override.",
                auto_saved: "Auto-saved to cloud",
                question: "Question",
                performance: "Performance",
                details: "Details",
                positive_marks: "+ Marks",
                negative_marks: "- Marks",
                net_score: "Net Score",
                percentage: "Percentage",
                previous: "Previous",
                next: "Next",
                complete_all: "Complete All Grading",
                confirm_finalize: "Are you sure you want to finalize results? This cannot be undone.",
                all_graded: "All questions graded!",
                view_history: "View History",
                graded: "Graded"
            },
            bn: {
                app_name: "ওএমআর মাস্টার", pro: "প্রো", dashboard: "ড্যাশবোর্ড", active_session: "চলমান সেশন",
                analytics: "বিশ্লেষণ", about: "আমাদের সম্পর্কে", report: "সমস্যা জানান", guideline: "নির্দেশাবলী", contact: "যোগাযোগ",
                footer_credit: "ডিজাইন ও ডেভেলপমেন্টে", footer_rights: "সর্বস্বত্ব সংরক্ষিত।",
                correction_title: "স্মার্ট সংশোধন ও ফলাফল",
                exam_name: "পরীক্ষার নাম",
                total_questions: "মোট প্রশ্ন",
                attempted: "উত্তর দেওয়া",
                correct: "সঠিক",
                wrong: "ভুল",
                skipped: "উত্তরহীন",
                score: "স্কোর",
                accuracy: "সঠিকতা",
                time_taken: "ব্যয়িত সময়",
                finalize_results: "ফলাফল চূড়ান্ত করুন",
                loading_results: "ফলাফল লোড হচ্ছে...",
                keyboard_shortcuts: "কীবোর্ড শর্টকাট",
                use_shortcuts: "সঠিক উত্তর সেট করতে A, B, C, D টাইপ করুন। ম্যানুয়াল চেঞ্জ করতে অ্যারো কী ব্যবহার করুন।",
                auto_saved: "স্বয়ংক্রিয়ভাবে সংরক্ষিত",
                question: "প্রশ্ন",
                performance: "কর্মক্ষমতা",
                details: "বিস্তারিত",
                positive_marks: "+ মার্কস",
                negative_marks: "- মার্কস",
                net_score: "নেট স্কোর",
                percentage: "শতাংশ",
                previous: "পূর্ববর্তী",
                next: "পরবর্তী",
                complete_all: "সব গ্রেডিং সম্পূর্ণ করুন",
                confirm_finalize: "আপনি কি নিশ্চিত যে আপনি ফলাফল চূড়ান্ত করতে চান? এটি পূর্বাবস্থায় ফেরানো যাবে না।",
                all_graded: "সব প্রশ্ন গ্রেড করা হয়েছে!",
                view_history: "ইতিহাস দেখুন",
                graded: "মূল্যায়িত"
            }
        };

        // --- Icons ---
        const Icons = {
            Home: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Play: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            BarChart: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>,
            Sun: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
            Moon: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
            Globe: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
            CheckCircle: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            AlertCircle: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            ChevronLeft: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            ChevronRight: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            Cloud: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>,
            Zap: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Book: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
            Flag: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>,
            Mail: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
            Award: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
        };

        const AppContext = createContext();

        // --- Circular Progress Component ---
        const CircularProgress = memo(({ percentage, size = 80, strokeWidth = 8, label = null }) => {
            const radius = (size - strokeWidth) / 2;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (percentage / 100) * circumference;
            
            const getColor = () => {
                if (percentage >= 80) return '#10b981';
                if (percentage >= 60) return '#f59e0b';
                return '#ef4444';
            };

            return (
                <div className="relative" style={{ width: size, height: size }}>
                    <svg className="progress-ring" width={size} height={size}>
                        <circle cx={size / 2} cy={size / 2} r={radius} stroke="#e2e8f0" strokeWidth={strokeWidth} fill="transparent" className="dark:stroke-slate-700" />
                        <circle cx={size / 2} cy={size / 2} r={radius} stroke={getColor()} strokeWidth={strokeWidth} fill="transparent" strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" className="progress-ring__circle" style={{ strokeDashoffset }} />
                    </svg>
                    <div className="absolute inset-0 flex items-center justify-center text-center">
                        <div>
                            <div className="font-bold text-lg" style={{ color: getColor() }}>{percentage.toFixed(0)}%</div>
                            {label && <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">{label}</div>}
                        </div>
                    </div>
                </div>
            );
        });

        // --- Navbar ---
        const Navbar = memo(({ activePage }) => {
            const { lang, setLang, darkMode, setDarkMode } = useContext(AppContext);
            const [sessionActive, setSessionActive] = useState(false);
            const [isOpen, setIsOpen] = useState(false);
            const t = (k) => translations[lang][k] || k;

            useEffect(() => {
                const session = localStorage.getItem('omr_current_session');
                if (session) setSessionActive(true);
            }, []);

            const toggleTheme = () => {
                setDarkMode(!darkMode);
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', !darkMode ? 'dark' : 'light');
            };

            const toggleLang = () => {
                const newLang = lang === 'en' ? 'bn' : 'en';
                setLang(newLang);
                localStorage.setItem('lang', newLang);
            };

            const links = [
                { name: t('dashboard'), href: 'index.html', icon: Icons.Home, active: activePage === 'home' },
                { name: t('active_session'), href: 'exam.html', icon: Icons.Play, active: activePage === 'exam', hidden: !sessionActive },
                { name: t('analytics'), href: 'analytics.html', icon: Icons.BarChart, active: activePage === 'analytics' },
            ];

            const secondaryLinks = [
                { name: t('about'), icon: Icons.Book, href: 'about.html' },
                { name: t('guideline'), icon: Icons.Flag, href: 'guidelines.html' },
                { name: t('report'), icon: Icons.AlertCircle, href: 'report.html' },
                { name: t('contact'), icon: Icons.Mail, href: 'contact.html' },
            ];

            return (
                <nav className="fixed top-0 inset-x-0 z-50 nav-glass transition-all duration-300 shadow-sm">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-20">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={() => window.location.href='index.html'}>
                            <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20 transition-transform group-hover:scale-105">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
                            </div>
                            <div className={lang === 'bn' ? 'font-bangla' : ''}>
                                <h1 className="text-xl font-bold text-slate-800 dark:text-white tracking-tight leading-none">{t('app_name')}</h1>
                                <span className="text-[10px] font-bold tracking-widest text-blue-600 dark:text-blue-400 uppercase">{t('pro')}</span>
                            </div>
                        </div>

                        {/* Desktop Menu */}
                        <div className="hidden lg:flex items-center gap-2">
                            <div className="flex items-center gap-1 mr-4 bg-slate-100 dark:bg-slate-800 p-1.5 rounded-full border border-slate-200 dark:border-slate-700">
                                {links.map(link => !link.hidden && (
                                    <a key={link.name} href={link.href} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 ${link.active ? 'bg-white dark:bg-slate-600 text-blue-600 dark:text-blue-300 shadow-sm' : 'text-slate-500 hover:text-slate-800 dark:hover:text-slate-200'}`}>
                                        <link.icon /> <span className={lang === 'bn' ? 'font-bangla' : ''}>{link.name}</span>
                                    </a>
                                ))}
                            </div>
                            {secondaryLinks.map((item, idx) => (
                                <a key={idx} href={item.href} title={item.name} className="p-2.5 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors"><item.icon /></a>
                            ))}
                            <div className="h-6 w-px bg-slate-200 dark:bg-slate-700 mx-2"></div>
                            <button onClick={toggleLang} className="flex items-center gap-2 px-3 py-2 rounded-xl bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 font-bold text-sm hover:scale-105 transition-transform">
                                <Icons.Globe /> {lang === 'en' ? 'BN' : 'EN'}
                            </button>
                            <button onClick={toggleTheme} className="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:rotate-12 transition-transform">
                                {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                            </button>
                        </div>

                        {/* Mobile Menu Controls */}
                        <div className="lg:hidden flex items-center gap-3">
                            <button onClick={toggleTheme} className="text-slate-600 dark:text-slate-300 p-2">
                                {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                            </button>
                            <button onClick={() => setIsOpen(!isOpen)} className="p-2 text-slate-500 bg-slate-100 dark:bg-slate-800 rounded-xl">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={isOpen ? "M6 18L18 6M6 6l12 12" : "M4 6h16M4 12h16M4 18h16"} />
                                </svg>
                            </button>
                        </div>
                    </div>

                    {/* Mobile Menu Dropdown */}
                    <div className={`lg:hidden transition-all duration-300 overflow-hidden ${isOpen ? 'max-h-[calc(100vh-5rem)] border-t border-slate-200 dark:border-slate-700 bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl' : 'max-h-0'}`}>
                        <div className="px-4 pt-4 pb-6 space-y-4">
                            <div className="flex flex-col space-y-2">
                                {links.map(link => !link.hidden && (
                                    <a key={link.name} href={link.href} className={`flex items-center gap-3 px-4 py-3 rounded-xl text-base font-bold transition-all ${link.active ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                                        <link.icon /> <span className={lang === 'bn' ? 'font-bangla' : ''}>{link.name}</span>
                                    </a>
                                ))}
                            </div>
                            
                            <div className="h-px w-full bg-slate-200 dark:bg-slate-700/50"></div>
                            
                            <div className="flex flex-col space-y-2">
                                {secondaryLinks.map((item, idx) => (
                                    <a key={idx} href={item.href} className="flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl font-medium">
                                        <item.icon /> <span className={lang === 'bn' ? 'font-bangla' : ''}>{item.name}</span>
                                    </a>
                                ))}
                                
                                <button onClick={toggleLang} className="flex items-center gap-3 px-4 py-3 w-full text-left text-indigo-600 dark:text-indigo-400 font-bold bg-indigo-50 dark:bg-indigo-900/20 rounded-xl mt-2 transition-colors">
                                    <Icons.Globe /> {lang === 'en' ? 'বাংলায় পরিবর্তন করুন (BN)' : 'Switch to English (EN)'}
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        });

        // --- Footer ---
        const Footer = memo(() => {
            const { lang } = useContext(AppContext);
            const t = (k) => translations[lang][k] || k;
            return (
                <footer className="border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 backdrop-blur-lg mt-auto">
                    <div className="max-w-7xl mx-auto px-4 py-6 flex flex-col items-center justify-center gap-2 text-center">
                        <div className="flex items-center gap-2 text-slate-800 dark:text-slate-200 font-bold text-lg">
                            <span className="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-lg shadow-md">UH</span>
                            Urfa Hasan Fattah
                        </div>
                        <p className={`text-sm text-slate-500 dark:text-slate-400 ${lang === 'bn' ? 'font-bangla' : ''}`}>
                            {t('footer_credit')} <span className="font-semibold text-slate-700 dark:text-slate-300">Urfa Hasan Fattah</span>. &copy; {new Date().getFullYear()} {t('footer_rights')}
                        </p>
                    </div>
                </footer>
            );
        });

        // --- Stats Panel Component ---
        const StatsPanel = memo(({ stats, config }) => {
            const { lang } = useContext(AppContext);
            const t = (k) => translations[lang][k] || k;
            const accuracy = stats.correct > 0 ? (stats.correct / (stats.correct + stats.wrong) * 100) : 0;
            const percentage = (stats.score / (config.questionCount * config.positiveMarks)) * 100;

            return (
                <div className="glass-panel rounded-2xl p-6 mb-6">
                    <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-4 flex items-center gap-2">
                        <Icons.BarChart /> {t('performance')}
                    </h3>
                    <div className="grid grid-cols-4 gap-2 mb-6">
                        <div className="text-center p-2 rounded-xl bg-blue-50 dark:bg-blue-900/20">
                            <div className="text-xl font-bold text-blue-600 dark:text-blue-400">{stats.score.toFixed(2)}</div>
                            <div className="text-[10px] uppercase font-bold text-slate-500">{t('score')}</div>
                        </div>
                        <div className="text-center p-2 rounded-xl bg-green-50 dark:bg-green-900/20">
                            <div className="text-xl font-bold text-green-600 dark:text-green-400">{stats.correct}</div>
                            <div className="text-[10px] uppercase font-bold text-slate-500">{t('correct')}</div>
                        </div>
                        <div className="text-center p-2 rounded-xl bg-red-50 dark:bg-red-900/20">
                            <div className="text-xl font-bold text-red-600 dark:text-red-400">{stats.wrong}</div>
                            <div className="text-[10px] uppercase font-bold text-slate-500">{t('wrong')}</div>
                        </div>
                        <div className="text-center p-2 rounded-xl bg-slate-100 dark:bg-slate-800">
                            <div className="text-xl font-bold text-slate-600 dark:text-slate-400">{stats.skipped}</div>
                            <div className="text-[10px] uppercase font-bold text-slate-500">{t('skipped')}</div>
                        </div>
                    </div>
                    
                    <div className="flex justify-around items-center mb-4">
                        <div className="flex flex-col items-center">
                            <CircularProgress percentage={accuracy} size={64} strokeWidth={6} />
                            <div className="text-xs text-slate-500 mt-2 font-medium">{t('accuracy')}</div>
                        </div>
                        <div className="flex flex-col items-center">
                            <CircularProgress percentage={percentage} size={64} strokeWidth={6} />
                            <div className="text-xs text-slate-500 mt-2 font-medium">{t('percentage')}</div>
                        </div>
                    </div>
                </div>
            );
        });

        // --- Smart Question Card Component ---
        const SmartQuestionCard = memo(({ qNum, userAnswer, correctAnswer, status, onSetCorrectAnswer, onManualGrade, isCurrent, onSelect, config }) => {
            const options = useMemo(() => ['A', 'B', 'C', 'D', 'E'].slice(0, config.optionsCount), [config.optionsCount]);
            
            const getStatusStyles = () => {
                if (status === 'correct') return 'border-green-400 dark:border-green-500/50 bg-green-50/70 dark:bg-green-900/10 shadow-sm';
                if (status === 'wrong') return 'border-red-400 dark:border-red-500/50 bg-red-50/70 dark:bg-red-900/10 shadow-sm';
                if (status === 'skipped') return 'border-slate-300 dark:border-slate-600 bg-slate-100/50 dark:bg-slate-800/30';
                return 'border-blue-200 dark:border-blue-700 hover:border-blue-400 bg-white dark:bg-slate-800';
            };

            return (
                <div 
                    id={`q-${qNum}`}
                    onClick={() => onSelect(qNum)}
                    className={`glass-panel p-4 rounded-xl border-2 transition-all duration-200 cursor-pointer ${getStatusStyles()} ${isCurrent ? 'ring-2 ring-blue-500 ring-offset-2 dark:ring-offset-slate-900 scale-[1.02]' : ''}`}
                >
                    <div className="flex justify-between items-start mb-3">
                        <div className="flex items-center gap-3">
                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-bold text-white ${
                                status === 'correct' ? 'bg-green-500' : status === 'wrong' ? 'bg-red-500' : status === 'skipped' ? 'bg-slate-500' : 'bg-blue-500'
                            }`}>
                                {qNum}
                            </div>
                            <div>
                                <div className="text-[10px] uppercase tracking-wider text-slate-500 dark:text-slate-400 font-bold mb-0.5">User Answer</div>
                                <div className="text-lg font-extrabold text-slate-800 dark:text-white leading-none">
                                    {userAnswer || <span className="text-sm italic text-slate-400 font-normal">Skipped</span>}
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex gap-1.5 bg-white/50 dark:bg-slate-900/50 p-1 rounded-lg">
                            <button onClick={(e) => { e.stopPropagation(); onManualGrade(qNum, 'correct'); }} className={`w-7 h-7 rounded flex items-center justify-center text-sm font-bold transition-colors ${status === 'correct' ? 'bg-green-500 text-white shadow-sm' : 'text-slate-400 hover:bg-green-100 hover:text-green-600'}`}>✓</button>
                            <button onClick={(e) => { e.stopPropagation(); onManualGrade(qNum, 'wrong'); }} className={`w-7 h-7 rounded flex items-center justify-center text-sm font-bold transition-colors ${status === 'wrong' ? 'bg-red-500 text-white shadow-sm' : 'text-slate-400 hover:bg-red-100 hover:text-red-600'}`}>✗</button>
                        </div>
                    </div>

                    <div className="mt-3 pt-3 border-t border-slate-200 dark:border-slate-700/50">
                        <div className="flex justify-between items-center mb-2">
                            <span className="text-xs font-semibold text-slate-500 dark:text-slate-400">Set Answer Key</span>
                            {correctAnswer && <span className="text-[10px] font-bold text-green-600 dark:text-green-400 flex items-center gap-1"><Icons.CheckCircle /> Saved</span>}
                        </div>
                        <div className="flex gap-1.5">
                            {options.map(opt => (
                                <button 
                                    key={opt}
                                    onClick={(e) => { e.stopPropagation(); onSetCorrectAnswer(qNum, opt); }}
                                    className={`flex-1 py-1.5 rounded text-sm font-bold border transition-all ${
                                        correctAnswer === opt 
                                        ? 'bg-gradient-to-br from-green-400 to-emerald-500 border-green-500 text-white shadow shadow-green-500/30 transform scale-105' 
                                        : 'bg-white/80 dark:bg-slate-800/80 border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:border-green-400 hover:bg-green-50 dark:hover:bg-green-900/20'
                                    }`}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        });

        // --- Main Correction Component ---
        const CorrectionInterface = () => {
            const { lang } = useContext(AppContext);
            const t = (k) => translations[lang][k] || k;
            
            const [data, setData] = useState(null);
            const [grading, setGrading] = useState({});
            const [correctAnswers, setCorrectAnswers] = useState({});
            const [currentQuestion, setCurrentQuestion] = useState(1);
            const [isSaving, setIsSaving] = useState(false);
            const dataRef = useRef(null);
            
            const [stats, setStats] = useState({ correct: 0, wrong: 0, skipped: 0, score: 0 });

            // 1. Initialization
            useEffect(() => {
                const temp = localStorage.getItem('omr_temp_grading');
                if (!temp) {
                    window.location.href = 'index.html';
                    return;
                }
                const parsed = JSON.parse(temp);
                setData(parsed);
                dataRef.current = parsed;

                // Load templates/correct answers
                const templates = JSON.parse(localStorage.getItem('omr_correction_templates') || '{}');
                const savedKeys = templates[parsed.config.examName]?.correctAnswers || {};
                setCorrectAnswers(savedKeys);

                // Load session progress or initialize
                const savedProgress = localStorage.getItem(`omr_progress_${parsed.config.examName}`);
                if (savedProgress) {
                    setGrading(JSON.parse(savedProgress));
                } else {
                    const initialGrading = {};
                    for (let i = 1; i <= parsed.config.questionCount; i++) {
                        if (!parsed.answers[i]) {
                            initialGrading[i] = 'skipped';
                        } else if (savedKeys[i]) {
                            initialGrading[i] = parsed.answers[i] === savedKeys[i] ? 'correct' : 'wrong';
                        }
                    }
                    setGrading(initialGrading);
                }
            }, []);

            // 2. Real-time Auto-Save to LocalStorage
            useEffect(() => {
                if (!data) return;
                setIsSaving(true);
                
                // Save correct answers template
                if (Object.keys(correctAnswers).length > 0) {
                    const templates = JSON.parse(localStorage.getItem('omr_correction_templates') || '{}');
                    templates[data.config.examName] = {
                        examName: data.config.examName,
                        correctAnswers,
                        config: data.config,
                        updatedAt: new Date().toISOString()
                    };
                    localStorage.setItem('omr_correction_templates', JSON.stringify(templates));
                }

                // Save grading progress
                if (Object.keys(grading).length > 0) {
                    localStorage.setItem(`omr_progress_${data.config.examName}`, JSON.stringify(grading));
                }
                
                const timer = setTimeout(() => setIsSaving(false), 800);
                return () => clearTimeout(timer);
            }, [correctAnswers, grading, data]);

            // 3. Recalculate Stats
            useEffect(() => {
                if (!data) return;
                let correct = 0, wrong = 0, skipped = 0;
                Object.values(grading).forEach(status => {
                    if (status === 'correct') correct++;
                    else if (status === 'wrong') wrong++;
                    else if (status === 'skipped') skipped++;
                });
                
                const score = (correct * data.config.positiveMarks) - (wrong * data.config.negativeMarks);
                setStats({ correct, wrong, skipped, score: parseFloat(score.toFixed(2)) });
            }, [grading, data]);

            // 4. Memoized Action Handlers
            const handleSetCorrectAnswer = useCallback((qNum, ans) => {
                setCorrectAnswers(prev => ({ ...prev, [qNum]: ans }));
                // Smart auto-grade using current data from ref to prevent re-rendering loops
                const userAns = dataRef.current?.answers[qNum];
                setGrading(prev => {
                    if (!userAns) return { ...prev, [qNum]: 'skipped' };
                    return { ...prev, [qNum]: userAns === ans ? 'correct' : 'wrong' };
                });
            }, []);

            const handleManualGrade = useCallback((qNum, status) => {
                setGrading(prev => ({ ...prev, [qNum]: status }));
            }, []);

            const handleSelectQuestion = useCallback((qNum) => {
                setCurrentQuestion(qNum);
            }, []);

            const navigateQuestion = useCallback((dir) => {
                setCurrentQuestion(prev => {
                    const newQ = prev + dir;
                    if (newQ >= 1 && dataRef.current && newQ <= dataRef.current.config.questionCount) {
                        setTimeout(() => {
                            const el = document.getElementById(`q-${newQ}`);
                            if (el) {
                                const y = el.getBoundingClientRect().top + window.scrollY - 150;
                                window.scrollTo({ top: y, behavior: 'smooth' });
                            }
                        }, 50);
                        return newQ;
                    }
                    return prev;
                });
            }, []);

            // 5. Smart Keyboard Navigation
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (!dataRef.current) return;
                    // Ignore if typing in an input
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                    setCurrentQuestion(currentQ => {
                        const key = e.key.toUpperCase();
                        if (['A', 'B', 'C', 'D', 'E'].includes(key)) {
                            const optIndex = key.charCodeAt(0) - 65;
                            if (optIndex < dataRef.current.config.optionsCount) {
                                handleSetCorrectAnswer(currentQ, key);
                                navigateQuestion(1);
                            }
                        } else {
                            switch(e.key) {
                                case 'ArrowLeft': handleManualGrade(currentQ, 'wrong'); break;
                                case 'ArrowRight': handleManualGrade(currentQ, 'correct'); break;
                                case 'ArrowUp': e.preventDefault(); navigateQuestion(-1); break;
                                case 'ArrowDown': e.preventDefault(); navigateQuestion(1); break;
                                case ' ': e.preventDefault(); handleManualGrade(currentQ, 'skipped'); break;
                            }
                        }
                        return currentQ;
                    });
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [handleSetCorrectAnswer, handleManualGrade, navigateQuestion]);

            const finalizeResults = useCallback(() => {
                if (!confirm(t('confirm_finalize'))) return;
                
                const finalResult = {
                    id: Date.now(),
                    examName: data.config.examName,
                    date: new Date().toISOString(),
                    score: stats.score,
                    accuracy: stats.correct > 0 ? ((stats.correct / (stats.correct + stats.wrong)) * 100).toFixed(1) : 0,
                    timeTaken: data.timeTaken,
                    totalQuestions: data.config.questionCount,
                    correct: stats.correct,
                    wrong: stats.wrong,
                    skipped: stats.skipped,
                    gradingDetails: grading,
                    userAnswers: data.answers,
                    config: data.config
                };

                const history = JSON.parse(localStorage.getItem('omr_history') || '[]');
                history.push(finalResult);
                localStorage.setItem('omr_history', JSON.stringify(history));

                localStorage.removeItem('omr_temp_grading');
                localStorage.removeItem(`omr_progress_${data.config.examName}`);
                
                window.location.href = 'analytics.html';
            }, [data, stats, grading, t]);

            if (!data) return (
                <div className="min-h-screen flex flex-col font-sans">
                    <Navbar activePage="correction" />
                    <main className="flex-grow flex items-center justify-center">
                        <div className="text-center animate-pulse-slow">
                            <div className="w-16 h-16 mx-auto mb-6 rounded-full bg-gradient-to-r from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30">
                                <Icons.Award className="text-white text-3xl" />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 dark:text-white mb-2">{t('loading_results')}</h2>
                        </div>
                    </main>
                    <Footer />
                </div>
            );

            const { config } = data;
            const attemptedCount = Object.keys(data.answers).length;
            const gradedCount = Object.keys(grading).filter(q => grading[q] !== 'skipped').length;
            const isComplete = gradedCount === attemptedCount;

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <Navbar activePage="correction" />

                    <main className="flex-grow pt-24 pb-12">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            
                            {/* Header Section */}
                            <div className="glass-panel rounded-2xl p-6 mb-8 shadow-sm">
                                <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                                    <div>
                                        <div className="flex items-center gap-3 mb-1">
                                            <h1 className="text-2xl font-extrabold text-slate-800 dark:text-white tracking-tight">
                                                {t('correction_title')}
                                            </h1>
                                            {isSaving ? (
                                                <span className="flex items-center gap-1 text-xs font-semibold text-blue-500 bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded-full"><Icons.Cloud/> Saving...</span>
                                            ) : (
                                                <span className="flex items-center gap-1 text-xs font-semibold text-green-500 bg-green-50 dark:bg-green-900/30 px-2 py-1 rounded-full"><Icons.CheckCircle/> {t('auto_saved')}</span>
                                            )}
                                        </div>
                                        <p className="text-slate-600 dark:text-slate-400 font-medium">
                                            <span className="text-indigo-600 dark:text-indigo-400 font-bold">{config.examName}</span> • {config.questionCount} {t('total_questions')} • {attemptedCount} {t('attempted')}
                                        </p>
                                    </div>
                                    
                                    <div className="flex items-center gap-3 bg-white/50 dark:bg-slate-800/50 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700">
                                        <div className="px-4 py-2 flex items-center gap-2">
                                            <div className={`w-2.5 h-2.5 rounded-full ${isComplete ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-amber-500 animate-pulse'}`}></div>
                                            <span className="text-sm font-bold text-slate-700 dark:text-slate-200">
                                                {gradedCount}/{attemptedCount} {t('graded')}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex flex-col lg:flex-row gap-8">
                                {/* Left Sidebar */}
                                <div className="lg:w-1/3">
                                    <div className="sticky top-28 space-y-6">
                                        <StatsPanel stats={stats} config={config} />
                                        
                                        <div className="glass-panel rounded-2xl p-6">
                                            <h3 className="font-bold text-slate-800 dark:text-white mb-3 flex items-center gap-2">
                                                <Icons.Zap /> {t('keyboard_shortcuts')}
                                            </h3>
                                            <p className="text-sm text-slate-600 dark:text-slate-400 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-xl border border-slate-100 dark:border-slate-700 mb-4">
                                                {t('use_shortcuts')}
                                            </p>
                                            
                                            <div className="flex justify-between items-center bg-white dark:bg-slate-900 p-2 rounded-xl border border-slate-200 dark:border-slate-700">
                                                <button onClick={() => navigateQuestion(-1)} className="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-slate-800 rounded-lg transition-colors"><Icons.ChevronLeft /></button>
                                                <div className="text-center flex-1">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Jump to</div>
                                                    <div className="font-bold text-lg text-slate-800 dark:text-white">{currentQuestion} / {config.questionCount}</div>
                                                </div>
                                                <button onClick={() => navigateQuestion(1)} className="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-slate-800 rounded-lg transition-colors"><Icons.ChevronRight /></button>
                                            </div>
                                        </div>

                                        <button 
                                            onClick={finalizeResults}
                                            className={`w-full py-4 rounded-2xl font-bold text-lg shadow-xl transition-all duration-300 transform flex items-center justify-center gap-2 ${
                                                isComplete 
                                                ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:-translate-y-1 hover:shadow-indigo-500/40' 
                                                : 'bg-slate-200 dark:bg-slate-800 text-slate-400 cursor-not-allowed'
                                            }`}
                                        >
                                            {isComplete ? <><Icons.CheckCircle /> Finalize ({stats.score.toFixed(2)})</> : t('complete_all')}
                                        </button>
                                    </div>
                                </div>

                                {/* Right Content - Grid */}
                                <div className="lg:w-2/3">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {Array.from({ length: config.questionCount }, (_, i) => i + 1).map(qNum => (
                                            <SmartQuestionCard
                                                key={qNum}
                                                qNum={qNum}
                                                userAnswer={data.answers[qNum]}
                                                correctAnswer={correctAnswers[qNum]}
                                                status={grading[qNum] || 'pending'}
                                                onSetCorrectAnswer={handleSetCorrectAnswer}
                                                onManualGrade={handleManualGrade}
                                                isCurrent={currentQuestion === qNum}
                                                onSelect={handleSelectQuestion}
                                                config={config}
                                            />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        };

        const AppWrapper = () => {
            const [lang, setLang] = useState('en');
            const [darkMode, setDarkMode] = useState(false);

            useEffect(() => {
                const savedLang = localStorage.getItem('lang');
                if (savedLang) setLang(savedLang);
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    setDarkMode(true);
                    document.documentElement.classList.add('dark');
                }
            }, []);

            return (
                <AppContext.Provider value={{ lang, setLang, darkMode, setDarkMode }}>
                    <CorrectionInterface />
                </AppContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppWrapper />);
    </script>
</body>
</html>
